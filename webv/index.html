<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varwaa</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* SEMBUNYIKAN KURSOR BAWAAN DI DESTOP */
        html, body {
            cursor: none;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            overflow-x: hidden;
            background-color: #000;
        }

        /* ELEMEN CUSTOM CURSOR */
        .custom-cursor {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            position: fixed;
            transform: translate(-50%, -50%);
            pointer-events: none; /* Supaya kursor tidak mengganggu klik elemen di bawahnya */
            z-index: 99999;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            transition: width 0.2s ease, height 0.2s ease, background-color 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
        }

        /* Kursor di atas elemen interaktif (Hover State) */
        .custom-cursor.hovered {
            width: 35px;
            height: 35px;
            border-color: rgba(255, 255, 255, 1);
            background-color: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        /* Video Background */
        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* Overlay Awal (Untuk Autoplay) */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease;
        }

        #play-btn {
            margin-top: 30px;
            padding: 12px 35px;
            background: transparent;
            color: white;
            border: 2px solid white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            cursor: none;
            letter-spacing: 3px;
            transition: all 0.3s ease;
            border-radius: 5px;
        }

        #play-btn:hover {
            background: white;
            color: black;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }

        .overlay-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: -1;
            pointer-events: none;
        }

        header {
            text-align: center;
            padding: 60px 20px 30px;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* KOTAK CARD DENGAN STROKE BERJALAN */
        .card {
            position: relative;
            margin: 20px auto;
            max-width: 400px;
            height: 90px;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: none;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            
            /* STATE AWAL SEBELUM ANIMASI (Disembunyikan) */
            opacity: 0;
            transform: translateY(30px);
        }

        /* CLASS AKTIF UNTUK MEMICU ANIMASI MASUK */
        .card.reveal {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* Efek Hover setelah animasi selesai */
        .card:hover {
            box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .card:active {
            transform: scale(0.97);
        }

        /* Garis/Cahaya yang Berputar di Belakang */
        .card::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 600%;
            background: conic-gradient(
                transparent, 
                rgba(255, 255, 255, 0.1), 
                rgba(255, 255, 255, 0.8), 
                rgba(255, 255, 255, 0.1), 
                transparent 70%
            );
            animation: rotateStroke 4s linear infinite;
            z-index: 1;
        }

        /* Lapisan Konten Utama di Atas Garis */
        .card-inner {
            position: absolute;
            inset: 1.5px;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            z-index: 2;
            transition: background 0.3s ease;
        }

        .card:hover .card-inner {
            background: rgba(40, 40, 40, 0.7);
        }

        .card a {
            text-decoration: none;
            color: white;
            display: block;
            width: 100%;
            cursor: none;
        }

        .card h2 {
            margin: 0;
            font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .card h2 i {
            width: 25px;
            text-align: center;
        }

        .card p {
            margin: 6px 0 0;
            opacity: 0.6;
            font-size: 0.8rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1.5px;
            text-align: center;
        }

        /* TOMBOL SHARE BERGAYA FUTURISTIK */
        .share-btn-container {
            opacity: 0;
            transform: translateY(30px);
            margin: 25px auto 10px;
            max-width: 400px;
        }

        .share-btn-container.reveal {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        #share-profile-btn {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px dashed rgba(255, 255, 255, 0.3);
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-radius: 10px;
            cursor: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        #share-profile-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-style: solid;
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        #share-profile-btn:active {
            transform: scale(0.98);
        }

        /* TOAST NOTIFIKASI BERHASIL COPY LINK */
        #toast-notification {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.9);
            color: black;
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: bold;
            border-radius: 30px;
            letter-spacing: 1px;
            z-index: 10000;
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #toast-notification.show {
            bottom: 30px;
        }

        /* ELEMEN LAIN YANG DI-ANIMASIKAN */
        header h1, header p, .visitor-wrapper {
            opacity: 0;
            transform: translateY(20px);
        }

        header h1.reveal, header p.reveal, .visitor-wrapper.reveal {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        /* PENGATURAN JEDA WAKTU (DELAY) CASCADE */
        header h1.reveal { animation-delay: 0.1s; }
        header p.reveal  { animation-delay: 0.3s; }
        .card.reveal:nth-child(1) { animation-delay: 0.5s; }
        .card.reveal:nth-child(2) { animation-delay: 0.7s; }
        .card.reveal:nth-child(3) { animation-delay: 0.9s; }
        .card.reveal:nth-child(4) { animation-delay: 1.1s; }
        .share-btn-container.reveal { animation-delay: 1.3s; }
        .visitor-wrapper.reveal   { animation-delay: 1.5s; }


        /* ANIMASI ROTASI STROKE */
        @keyframes rotateStroke {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ANIMASI FADE IN UP */
        @keyframes fadeInUp {
            0% {
                opacity: 0;
                transform: translateY(30px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* EFEK GLITCH */
        .glitch {
            position: relative;
            font-size: 42px;
            font-weight: 700;
            text-transform: uppercase;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            display: inline-block;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            z-index: -1;
        }

        .glitch::before {
            color: #a2bba3;
            animation: glitchAnim 3s infinite linear alternate-reverse;
            clip-path: inset(0 0 50% 0);
            left: -2px;
        }

        .glitch::after {
            color: #648382;
            animation: glitchAnim 2s infinite linear alternate;
            clip-path: inset(50% 0 0 0);
            left: 2px;
        }

        @keyframes glitchAnim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 1px); }
            40% { transform: translate(-2px, -1px); }
            60% { transform: translate(2px, 1px); }
            80% { transform: translate(2px, -1px); }
            100% { transform: translate(0); }
        }

        /* NONAKTIFKAN CUSTOM CURSOR DI MOBILE */
        @media (max-width: 480px) {
            html, body, .card, .card a, #share-profile-btn, #play-btn {
                cursor: auto;
            }
            .custom-cursor {
                display: none !important;
            }
            .glitch { font-size: 30px; }
            .card { max-width: 90%; }
            #share-profile-btn { max-width: 90%; margin: 0 auto; }
        }

        /* FLOATING ICONS */
        .floating-icons {
            position: fixed;
            width: 100%;
            height: 100%;
            pointer-events: none;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
        }

        .floating-icons i {
            position: absolute;
            bottom: -50px;
            opacity: 0;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1) rotate(0deg);
                opacity: 0;
            }
            20% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% {
                transform: translateY(-110vh) scale(1.3) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>

<!-- Elemen Custom Cursor -->
<div class="custom-cursor" id="cursor"></div>

<!-- Toast Notification -->
<div id="toast-notification">
    <i class="fas fa-check-circle"></i> LINK COPIED TO CLIPBOARD!
</div>

<div id="welcome-overlay">
    <h1 class="glitch" data-text="Varwaa">Varwaa</h1>
    <button id="play-btn">START NOW</button>
</div>

<video autoplay muted loop playsinline id="bg-video" preload="auto">
    <source src="pega33.mp4" type="video/mp4">
</video>

<audio id="musik" loop>
    <source src="pega2.mp3" type="audio/mpeg">
</audio>

<div class="overlay-bg"></div>
<div class="floating-icons" id="floating-icons"></div>

<header>
    <h1 id="header-title" class="glitch" data-text="Varwaa">Varwaa</h1>
    <p id="header-desc" style="letter-spacing: 1px; opacity: 0.8; margin-top: 10px; font-family: 'Orbitron', sans-serif; font-size: 0.7rem;">Hello everyone, welcome. Please click the link below to continue to my social media. Thank you..</p>
</header>

<div class="container">
    <!-- INSTAGRAM -->
    <div class="card">
        <div class="card-inner">
            <a href="https://www.instagram.com/dwadhy_?igsh=c280YnVqaXN6cW42&utm_source=qr" target="_blank" rel="noopener">
                <h2><i class="fab fa-instagram"></i> Instagram</h2>
                <p>@dwadhy_</p>
            </a>
        </div>
    </div>

    <!-- DISCORD -->
    <div class="card">
        <div class="card-inner">
            <a href="https://discord.gg/UrVv9yjz" target="_blank" rel="noopener">
                <h2><i class="fab fa-discord"></i> Discord</h2>
                <p>@1puzle</p>
            </a>
        </div>
    </div>

    <!-- TIKTOK -->
    <div class="card">
        <div class="card-inner">
            <a href="https://www.tiktok.com/@dwadhy" target="_blank" rel="noopener">
                <h2><i class="fab fa-tiktok"></i> TikTok</h2>
                <p>@dwadhy</p>
            </a>
        </div>
    </div>

    <!-- FACEBOOK -->
    <div class="card">
        <div class="card-inner">
            <a href="https://www.facebook.com/profile.php?id=61563674347607&mibextid=wwXIfr" target="_blank" rel="noopener">
                <h2><i class="fab fa-facebook"></i> Facebook</h2>
                <p>@dwadhy_</p>
            </a>
        </div>
    </div>

    <!-- TOMBOL SHARE -->
    <div class="share-btn-container">
        <button id="share-profile-btn">
            <i class="fas fa-share-nodes"></i> SHARE
        </button>
    </div>

    <!-- VISITOR COUNTER -->
    <div class="visitor-wrapper" style="display: flex; align-items: center; justify-content: center; margin-top: 30px; opacity: 0.8;">
        <i class="fas fa-eye" style="font-size: 1.2rem; margin-right: 10px;"></i>
        <span id="visitor-counter" style="font-family: 'Orbitron', sans-serif; font-size: 1.1rem; letter-spacing: 1px;">...</span>
    </div>
</div>

<script>
    const musik = document.getElementById("musik");
    const overlay = document.getElementById("welcome-overlay");
    const playBtn = document.getElementById("play-btn");
    const video = document.getElementById("bg-video");

    const headerTitle = document.getElementById("header-title");
    const headerDesc = document.getElementById("header-desc");
    const cards = document.querySelectorAll(".card");
    const shareBtnContainer = document.querySelector(".share-btn-container");
    const visitorWrapper = document.querySelector(".visitor-wrapper");

    // ===== LOGIK CUSTOM CURSOR =====
    const cursor = document.getElementById("cursor");
    
    document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });

    const interactiveElements = document.querySelectorAll(".card, #play-btn, #share-profile-btn");
    
    interactiveElements.forEach(elem => {
        elem.addEventListener("mouseenter", () => {
            cursor.classList.add("hovered");
        });
        elem.addEventListener("mouseleave", () => {
            cursor.classList.remove("hovered");
        });
    });

    function startMedia() {
        musik.play().catch(() => {});
        video.play().catch(() => {});
        
        overlay.style.opacity = "0";
        setTimeout(() => {
            overlay.style.display = "none";
            
            headerTitle.classList.add("reveal");
            headerDesc.classList.add("reveal");
            cards.forEach(card => card.classList.add("reveal"));
            shareBtnContainer.classList.add("reveal");
            visitorWrapper.classList.add("reveal");
        }, 800);
    }

    playBtn.addEventListener("click", startMedia);

    // ===== REAL-TIME VISITOR COUNTER GLOBAL =====
    function updateVisitorCount() {
        // Menggunakan layanan hit counter gratis & real-time dari CounterAPI
        // 'varwaa_cyber_links' adalah namespace unik database Anda
        fetch('https://api.counterapi.dev/v1/varwaa_cyber_links/visits/up')
            .then(res => res.json())
            .then(data => {
                // Berhasil mengambil data asli dari database pusat
                document.getElementById('visitor-counter').innerText = data.count.toLocaleString('id-ID');
            })
            .catch(() => {
                // Jika koneksi internet pengunjung bermasalah, gunakan sistem lokal sementara
                let current = parseInt(localStorage.getItem('v_varwaa') || "1042");
                current++;
                localStorage.setItem('v_varwaa', current);
                document.getElementById('visitor-counter').innerText = current.toLocaleString('id-ID');
            });
    }

    document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
            musik.pause();
        } else {
            if (overlay.style.display === "none") {
                musik.play().catch(() => {});
                video.play().catch(() => {});
            }
        }
    });

    window.addEventListener('DOMContentLoaded', updateVisitorCount);

    const icons = ["fa-instagram", "fa-discord", "fa-tiktok", "fa-facebook"];
    const container = document.getElementById("floating-icons");

    function createIcon() {
        if (document.hidden) return; 
        
        const i = document.createElement("i");
        i.className = "fab " + icons[Math.floor(Math.random() * icons.length)];

        i.style.left = Math.random() * 95 + "vw"; 
        i.style.animationDuration = (5 + Math.random() * 5) + "s";
        i.style.fontSize = (15 + Math.random() * 20) + "px";

        container.appendChild(i);

        setTimeout(() => {
            i.remove();
        }, 10000);
    }

    setInterval(createIcon, 900);

    // ===== FUNGSI SHARE =====
    const shareBtn = document.getElementById("share-profile-btn");
    const toast = document.getElementById("toast-notification");

    shareBtn.addEventListener("click", () => {
        const shareData = {
            title: 'Varwaa Profile',
            text: 'Check out Varwaa official social media links!',
            url: window.location.href
        };

        if (navigator.share) {
            navigator.share(shareData).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href)
                .then(() => {
                    toast.classList.add("show");
                    setTimeout(() => {
                        toast.classList.remove("show");
                    }, 2500);
                })
                .catch(err => {
                    alert("Gagal menyalin link: " + err);
                });
        }
    });
</script>

</body>
</html>
